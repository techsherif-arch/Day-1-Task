<!DOCTYPE html>
<html lang="en">
<head>

<title>Giant Online Mart</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background:  #f7e6e0;
    text-align: center;
}

header {
    background: linear-gradient(to right, #fc4a3d, #2575fc);
    color: #ffe082;
    padding: 15px;
    position: relative;
}

header h1 {
    margin: 0;
    color: #000000;
}

.cart {
    position: absolute;
    right: 20px;
    top: 20px;
    background: linear-gradient(to right, #ff512f, #dd2476);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
}

ul {
    display: flex;
    justify-content: center;
    list-style-type: none;
    gap: 30px;
    padding: 20px;
}

li {
    background: linear-gradient(to bottom, #f49494, #c0e1f8);
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    width: 160px;
    transition: 0.3s;
}

li:hover {
    transform: scale(1.05);
}

li p {
    color: #000000;
    font-weight: bold;
}

img {
    width: 100px;
    height: 100px;
}

button {
    margin-top: 10px;
    padding: 8px;
    background: linear-gradient(to right, #43a047, #66bb6a);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: linear-gradient(to right, #2e7d32, #43a047);
}

footer {
    background: linear-gradient(to right, #aaf1f4, #9a0407);
    color: #000000;
    padding: 10px;
    position: fixed;
    width: 100%;
    bottom: 0;
}
</style>
</head>

<body>

<header>
    <h1>Giant Online Mart</h1>
    <div class="cart">
        Cart (<span id="cart-count">0</span>)
    </div>
</header>

<ul>

    <li>
        <img src="goodday.jpg"><br>
        <p>Good Day Biscuit</p>
        <button onclick="addToCart()">Add</button>
    </li>

    <li>
        <img src="hide.jpg"><br>
        <p>Hide & Seek</p>
        <button onclick="addToCart()">Add</button>
    </li>

    <li>
        <img src="parle.jpg"><br>
        <p>Parle-G</p>
        <button onclick="addToCart()">Add</button>
    </li>

</ul>

<footer>
    Created by Mohammed Sharif
</footer>

<script>
let cartCount = 0;

function addToCart() {
    cartCount++;
    document.getElementById("cart-count").textContent = cartCount;
    alert("Item added to cart!");
}
</script>

</body>
</html>
