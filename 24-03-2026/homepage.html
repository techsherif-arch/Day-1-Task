<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Methods</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .internal{
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            color: #4b2e2e;
            padding: 20px;
            margin: 20px;
            border: 2px solid #ff7f50;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<h1>CSS Styling Methods</h1>

<div style="background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: #2d2d2d; padding: 20px; margin: 20px; border: 2px solid #8e44ad; border-radius: 12px;">
    <h2>Inline CSS</h2>
    <p>This section uses Inline CSS.</p>
</div>

<div class="internal">
    <h2>Internal CSS</h2>
    <p>This section uses Internal CSS.</p>
</div>

<div class="external">
    <h2>External CSS</h2>
    <p>This section uses External CSS.</p>
</div>

</body>
</html>
